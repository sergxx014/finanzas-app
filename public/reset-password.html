<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nueva contraseña — FinanzasApp</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body class="auth-page">
<main>
<div class="auth-card">
  <a href="/" class="auth-logo">💰 FinanzasApp</a>
  <h1 class="auth-title">Nueva contraseña</h1>
  <p class="auth-sub">Elige una contraseña segura</p>

  <div class="alert alert-error"   id="err-box"></div>
  <div class="alert alert-success" id="ok-box"></div>

  <div id="form-wrap">
    <div class="form-group">
      <label for="password">Nueva contraseña</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label for="confirm">Confirmar contraseña</label>
      <input type="password" id="confirm" class="form-control" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:.25rem" id="btn-reset">Guardar nueva contraseña</button>
  </div>

  <p class="auth-foot"><a href="/login">← Volver al inicio de sesión</a></p>
</div>
</main>
<script src="/js/reset-password.js"></script>
</body>
</html>
