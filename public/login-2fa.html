<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Verificación 2FA — FinanzasApp</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body class="auth-page">
<main>
<div class="auth-card">
  <a href="/" class="auth-logo">💰 FinanzasApp</a>
  <h1 class="auth-title">🔐 Verificación en dos pasos</h1>
  <p class="auth-sub">Introduce el código de 6 dígitos generado por tu aplicación de autenticación (Google Authenticator, Authy, 1Password, etc.)</p>

  <div class="alert alert-error" id="err-box"></div>

  <div class="form-group">
    <label for="token">Código TOTP</label>
    <input type="text"
           id="token"
           class="form-control"
           placeholder="123456"
           inputmode="numeric"
           autocomplete="one-time-code"
           maxlength="6"
           pattern="[0-9]{6}"
           style="font-size:1.5rem;letter-spacing:.3rem;text-align:center"
           autofocus>
  </div>

  <button class="btn btn-primary" style="width:100%;margin-top:.25rem" id="btn-verify">Verificar y entrar</button>

  <p class="auth-foot">
    ¿Has perdido el acceso al autenticador? Contacta con el administrador.
  </p>
  <p style="text-align:center;margin-top:.4rem">
    <a href="/login" style="color:var(--dim);font-size:.85rem">← Cancelar e iniciar sesión de nuevo</a>
  </p>
</div>
</main>

<script src="/js/login-2fa.js"></script>
</body>
</html>
