<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Recuperar contraseña — FinanzasApp</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body class="auth-page">
<main>
<div class="auth-card">
  <a href="/" class="auth-logo">💰 FinanzasApp</a>
  <h1 class="auth-title">Recuperar contraseña</h1>
  <p class="auth-sub">Te enviaremos un enlace a tu correo</p>

  <div class="alert alert-error"   id="err-box"></div>
  <div class="alert alert-success" id="ok-box"></div>

  <div class="form-group">
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" class="form-control" placeholder="tu@email.com" autocomplete="email">
  </div>

  <button class="btn btn-primary" style="width:100%;margin-top:.25rem" id="btn-send">Enviar enlace</button>

  <p class="auth-foot"><a href="/login">← Volver al inicio de sesión</a></p>
</div>
</main>
<script src="/js/forgot-password.js"></script>
</body>
</html>
